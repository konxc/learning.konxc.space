	<head>

		<meta
			name="description"
			content="Program pelatihan intensif developer - Naik Kelas by Koneksi"
		/>

		<link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png" />
		<link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png" />
		<link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
		<link rel="apple-touch-icon" href="/apple-icon.png" />

		<!-- Android Icons -->
		<link rel="icon" type="image/png" sizes="36x36" href="/android-icon-36x36.png" />
		<link rel="icon" type="image/png" sizes="48x48" href="/android-icon-48x48.png" />
		<link rel="icon" type="image/png" sizes="72x72" href="/android-icon-72x72.png" />
		<link rel="icon" type="image/png" sizes="96x96" href="/android-icon-96x96.png" />
		<link rel="icon" type="image/png" sizes="144x144" href="/android-icon-144x144.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />

		<!-- Microsoft Icons -->
		<meta name="msapplication-TileColor" content="#667eea" />
		<meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
		<meta name="msapplication-config" content="/browserconfig.xml" />

		<!-- PWA Manifest (conditionally loaded) -->
		<script>
			window.__PWA_ENABLED__ = __PWA_ENABLED__;
			window.__ANALYTICS_ENABLED__ = __ANALYTICS_ENABLED__;
			window.__SW_ENABLED__ = __SW_ENABLED__;
		</script>

		<!-- PWA - Only include if enabled -->
		<script>
			if (window.__PWA_ENABLED__) {
				document.write('<link rel="manifest" href="/manifest.json" />');
				document.write('<meta name="mobile-web-app-capable" content="yes" />');
				document.write(
					'<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />'
				);
				document.write('<meta name="apple-mobile-web-app-title" content="Naik Kelas" />');
			}
		</script>

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "EducationalOrganization",
				"name": "Naik Kelas by Koneksi",
				"description": "Program pelatihan intensif developer",
				"url": "https://learning.konxc.space",
				"logo": "https://learning.konxc.space/apple-icon-180x180.png",
				"sameAs": [],
				"offers": {
					"@type": "Offer",
					"category": "Programming Course"
				}
			}
		</script>

		<!-- Analytics - Conditionally loaded -->
		<script>
			if (window.__ANALYTICS_ENABLED__) {
				var umamiScript = document.createElement('script');
				umamiScript.defer = true;
				umamiScript.src = 'https://cloud.umami.is/script.js';
				umamiScript.setAttribute('data-website-id', '7af81a1a-5d3d-4355-af3b-31d9076f74ae');
				document.head.appendChild(umamiScript);
			}
		</script>

		<!-- Blocking theme script - prevents FOUC by running before any rendering -->
		<script>
			(function () {
				// Immediately check theme before any rendering occurs
				try {
					// Parse cookie
					const cookieMatch = document.cookie.match(/nk-theme=([^;]+)/);
					const cookieTheme = cookieMatch ? cookieMatch[1] : null;

					// Check localStorage (faster than cookie parsing)
					let storedTheme = null;
					try {
						storedTheme = localStorage.getItem('nk-theme');
					} catch (e) {}

					// Priority: localStorage > cookie > system
					const theme = storedTheme || cookieTheme || 'system';

					// Validate theme value
					const validTheme =
						theme === 'light' || theme === 'dark' || theme === 'system' ? theme : 'system';

					// Determine if dark mode
					const systemDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false;
					const isDark = validTheme === 'dark' || (validTheme === 'system' && systemDark);

					// Apply immediately - this blocks rendering until complete
					if (isDark) {
						document.documentElement.classList.add('dark');
					} else {
						document.documentElement.classList.remove('dark');
					}

					// Set sidebar collapsed state to prevent flicker
					try {
						const sidebarCollapsed = localStorage.getItem('sidebar-collapsed');
						if (sidebarCollapsed === 'true') {
							document.documentElement.setAttribute('data-sidebar-collapsed', 'true');
						} else {
							document.documentElement.setAttribute('data-sidebar-collapsed', 'false');
						}
					} catch (e) {
						// Silent fail - default to expanded
						document.documentElement.setAttribute('data-sidebar-collapsed', 'false');
					}
				} catch (e) {
					// Silent fail - fallback to system preference
					const systemDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false;
					if (systemDark) {
						document.documentElement.classList.add('dark');
					}
					// Default sidebar to expanded
					document.documentElement.setAttribute('data-sidebar-collapsed', 'false');
				}
			})();
		</script>

		%sveltekit.head%

		<!-- Service Worker Registration (conditionally loaded) -->
		<script>
			if (window.__SW_ENABLED__ && 'serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					navigator.serviceWorker
						.register('/sw.js')
						.then((registration) => {
							console.log('[SW] Registered:', registration.scope);

							// Listen for updates
							registration.addEventListener('updatefound', () => {
								const newWorker = registration.installing;
								newWorker.addEventListener('statechange', () => {
									if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
										console.log('[SW] New version available! Reloading...');
										window.location.reload();
									}
								});
							});
						})
						.catch((error) => {
							console.log('[SW] Registration failed:', error);
						});
				});
			}
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<!-- Cleanup script to prevent stale service worker issues -->
		<script>
			// Clear any corrupted caches on page load (only if SW is enabled)
			if (window.__SW_ENABLED__ && 'caches' in window) {
				window.addEventListener('load', () => {
					// Clear old caches that might cause issues
					caches.keys().then((cacheNames) => {
						cacheNames.forEach((cacheName) => {
							// Only delete if it's an old version
							if (cacheName.startsWith('naikkelas-') && !cacheName.includes('v1')) {
								caches.delete(cacheName);
							}
						});
					});
				});
			}
		</script>
	</body>
</html>
