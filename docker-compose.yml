# ============================================================
# Naik Kelas 2.0 - Docker Compose PRODUCTION & PREVIEW 
# ============================================================
# Usage:
#   1. Copy .env.production to .env and configure values
#   2. docker network create nginx-net (if not exists)
#   3. docker compose up -d --build
#   4. Use Nginx Proxy Manager / Host Nginx to route to naikkelas-app:3000
#      (Or use Traefik Dev Proxy if testing SSH Port Forwarding)
# ============================================================

services:
  # ============================================================
  # Application Service (Production Build)
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: naikkelas:latest
    container_name: naikkelas-app
    restart: unless-stopped
    # PORT BINDINGS REMOVED FOR SECURITY 
    # Must be routed via proxy on nginx-net network
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - VIRTUAL_HOST=naikkelas.konxc.space
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=naikkelas.konxc.space
      - LETSENCRYPT_EMAIL=admin@konxc.space
    volumes:
      # Persist SQLite database (if using file-based DB)
      - app-data:/data
      # Persist uploaded files
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - naikkelas-network
      - nginx-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "nginx.proxy.enable=true"

  # ============================================================
  # Redis Cache (for session store & caching)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: naikkelas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - naikkelas-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  app-data:
    driver: local
  uploads:
    driver: local
  redis-data:
    driver: local

networks:
  naikkelas-network:
    driver: bridge
    name: naikkelas-network
  nginx-net:
    external: true
