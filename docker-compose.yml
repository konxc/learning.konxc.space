# ============================================================
# Naik Kelas 2.0 - Docker Compose Production Configuration
# ============================================================
# Usage:
#   1. Copy .env.production to .env and configure values
#   2. docker compose up -d
#   3. docker compose exec app pnpm run db:push (first time only)
#   4. docker compose exec app pnpm run db:seed:remote (optional)
# ============================================================

services:
  # ============================================================
  # Application Service
  # ============================================================
  app:
    image: naikkelas:latest
    container_name: naikkelas-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
      # Persist SQLite database (if using file-based DB)
      - app-data:/data
      # Persist uploaded files
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - naikkelas-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Redis Cache (for session store & caching)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: naikkelas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - naikkelas-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================================
  # Nginx Reverse Proxy (Optional - for SSL termination)
  # Uncomment below and create docker/nginx/ directory
  # ============================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: naikkelas-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     app:
  #       condition: service_healthy
  #   networks:
  #     - naikkelas-network

volumes:
  app-data:
    driver: local
  uploads:
    driver: local
  redis-data:
    driver: local

networks:
  naikkelas-network:
    driver: bridge
    name: naikkelas-network
